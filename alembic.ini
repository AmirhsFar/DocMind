[alembic]
# The actual URL is read from settings.database_url inside env.py.
# This placeholder prevents alembic from crashing when it parses the file.
script_location = alembic
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

# Logging — Alembic writes migration progress to stdout.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
